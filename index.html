<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창호 추천 진단</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.app { max-width: 480px; margin: 0 auto; padding: 1rem; min-height: 100vh; background: #fff; }
.header { text-align: center; padding: 1.5rem 0 1rem; }
.header-badge { display: inline-block; background: #E6F1FB; color: #0C447C; font-size: 12px; padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; font-weight: 500; }
.header h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; line-height: 1.4; }
.header p { font-size: 14px; color: #666; line-height: 1.7; }
.progress-label { font-size: 13px; color: #888; text-align: right; margin-bottom: 4px; }
.progress-bar { background: #eee; border-radius: 99px; height: 6px; margin: 0 0 1.25rem; overflow: hidden; }
.progress-fill { height: 100%; background: #378ADD; border-radius: 99px; transition: width 0.4s ease; }
.question-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
.question-num { font-size: 12px; color: #aaa; margin-bottom: 6px; }
.question-text { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
.question-sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
.options-grid { display: grid; gap: 10px; }
.option-btn { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 14px 16px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.15s; width: 100%; }
.option-btn:hover { background: #f8f8f8; border-color: #bbb; }
.option-btn.selected { border: 2px solid #378ADD; background: #E6F1FB; }
.option-icon { font-size: 24px; width: 36px; text-align: center; flex-shrink: 0; }
.option-label { font-weight: 600; font-size: 15px; color: #1a1a1a; }
.option-desc { font-size: 12px; color: #888; margin-top: 2px; }
.option-btn.selected .option-label { color: #0C447C; }
.option-btn.selected .option-desc { color: #185FA5; }
.nav-row { display: flex; gap: 10px; margin-top: 0.5rem; }
.btn-back { flex: 0 0 auto; padding: 14px 20px; border: 1px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; color: #666; font-size: 15px; }
.btn-next { flex: 1; padding: 14px 20px; border: none; border-radius: 12px; background: #378ADD; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-next:not(:disabled):hover { opacity: 0.88; }
.result-section { display: none; }
.result-header { text-align: center; padding: 1.5rem 0 1rem; }
.result-header h1 { font-size: 19px; font-weight: 700; margin-bottom: 6px; color: #1a1a1a; line-height: 1.4; }
.result-header p { font-size: 13px; color: #888; }
.summary-box { background: #f8f9fa; border-radius: 12px; padding: 1rem 1.125rem; margin-bottom: 1.25rem; font-size: 13px; color: #555; line-height: 1.9; }
.summary-box strong { color: #1a1a1a; font-weight: 600; }
.rec-card { border-radius: 16px; border: 1px solid #e8e8e8; overflow: hidden; margin-bottom: 12px; background: #fff; }
.rec-card.top-pick { border: 2px solid #378ADD; }
.rec-top { padding: 1rem 1.25rem 0.875rem; }
.best-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
.badge-best { background: #E6F1FB; color: #0C447C; }
.badge-2nd { background: #f0f0f0; color: #666; }
.badge-3rd { background: #f0f0f0; color: #666; }
.brand-tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; margin-bottom: 8px; }
.brand-lx { background: #E1F5EE; color: #085041; }
.brand-kcc { background: #FAEEDA; color: #633806; }
.brand-hyundai { background: #FAECE7; color: #4A1B0C; }
.product-name { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
.product-model { font-size: 13px; color: #888; }
.rec-body { padding: 0.875rem 1.25rem; border-top: 1px solid #f0f0f0; }
.reason-title { font-size: 12px; color: #aaa; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.3px; }
.reason-list { list-style: none; }
.reason-list li { font-size: 13px; color: #555; padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
.reason-list li::before { content: "✓"; color: #1D9E75; font-size: 13px; flex-shrink: 0; margin-top: 1px; font-weight: 700; }
.rec-footer { padding: 0.875rem 1.25rem; background: #f8f9fa; display: flex; align-items: center; justify-content: space-between; }
.price-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.price-val { font-size: 16px; font-weight: 700; color: #1a1a1a; }
.rating-dots { display: flex; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
.dot.on { background: #378ADD; }
.cta-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.5rem; text-align: center; margin-bottom: 2rem; }
.cta-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #1a1a1a; }
.cta-card p { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.6; }
.btn-cta { display: block; width: 100%; padding: 15px; background: #378ADD; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
.btn-retry { display: block; width: 100%; padding: 13px; background: transparent; color: #888; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">

  <!-- 진단 섹션 -->
  <div id="quiz-section">
    <div class="header">
      <div class="header-badge">🪟 창호 추천 진단</div>
      <h1>내 집에 딱 맞는<br>창호를 찾아드려요</h1>
      <p>5가지 질문으로 LX하우시스 · KCC · 현대L&amp;C 중<br>최적의 창호를 추천해드립니다</p>
    </div>
    <div class="progress-label" id="progress-label">1 / 5 단계</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:20%"></div></div>
    <div class="question-card" id="question-card"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-back" onclick="goBack()" style="display:none">← 이전</button>
      <button class="btn-next" id="btn-next" onclick="goNext()" disabled>다음 →</button>
    </div>
  </div>

  <!-- 결과 섹션 -->
  <div class="result-section" id="result-section">
    <div class="result-header">
      <div class="header-badge">✅ 진단 완료</div>
      <h1 id="result-title">추천 창호 결과</h1>
      <p id="result-sub">고객님 집에 맞는 창호를 선별했습니다</p>
    </div>
    <div class="summary-box" id="summary-box"></div>
    <div id="rec-cards"></div>
    <div class="cta-card">
      <h3>📞 무료 현장 방문 견적 받기</h3>
      <p>전문 시공팀이 직접 방문해<br>정확한 견적을 알려드립니다</p>
      <button class="btn-cta" onclick="alert('상담 신청이 완료되었습니다!\n곧 연락드리겠습니다. 😊')">무료 상담 신청하기</button>
      <button class="btn-retry" onclick="restart()">↺ 다시 진단하기</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    num: "질문 1",
    text: "거주 형태가 어떻게 되시나요?",
    sub: "시공 환경에 따라 적합한 창호 종류가 달라집니다",
    options: [
      { icon: "🏢", label: "아파트", desc: "공동주택 · 층간 소음 고려" },
      { icon: "🏠", label: "빌라 / 다세대", desc: "1~4층 저층 주거" },
      { icon: "🏡", label: "단독주택", desc: "개별 건물 · 자유로운 시공" }
    ]
  },
  {
    num: "질문 2",
    text: "교체하실 창문 크기는?",
    sub: "창문 규격에 따라 제품 및 견적이 달라집니다",
    options: [
      { icon: "🔲", label: "소형", desc: "900×1200mm 이하 · 욕실·주방 창" },
      { icon: "⬜", label: "중형", desc: "1200×1500mm 내외 · 일반 거실·방" },
      { icon: "🖼️", label: "대형", desc: "1800×2100mm 이상 · 테라스·거실 통창" }
    ]
  },
  {
    num: "질문 3",
    text: "가장 해결하고 싶은 문제는?",
    sub: "핵심 고민에 따라 특화 기능이 다릅니다",
    options: [
      { icon: "🌡️", label: "단열", desc: "겨울 냉기·난방비 절감" },
      { icon: "🔇", label: "소음 차단", desc: "도로·교통 소음 차단" },
      { icon: "💧", label: "결로 방지", desc: "창문 물맺힘·곰팡이 예방" },
      { icon: "💨", label: "환기", desc: "미세먼지 차단 + 신선한 공기" }
    ]
  },
  {
    num: "질문 4",
    text: "예산 범위는 어떻게 되시나요?",
    sub: "창 1개 기준 (시공비 포함)",
    options: [
      { icon: "💰", label: "경제형", desc: "창 1개 40~70만원 · 가성비 우선" },
      { icon: "💳", label: "중간형", desc: "창 1개 70~120만원 · 성능·가격 균형" },
      { icon: "💎", label: "프리미엄", desc: "창 1개 120만원 이상 · 최고 성능" }
    ]
  },
  {
    num: "질문 5",
    text: "거주 층수는?",
    sub: "층수에 따라 바람 하중·기밀 등급이 달라집니다",
    options: [
      { icon: "🏠", label: "저층 (1~5층)", desc: "일반 기밀 등급 적용" },
      { icon: "🏬", label: "중층 (6~14층)", desc: "강화 기밀 권장" },
      { icon: "🏙️", label: "고층 (15층 이상)", desc: "고풍압·최고 기밀 등급 필수" }
    ]
  }
];

const answers = [];
let current = 0;

function renderQuestion() {
  const q = questions[current];
  const card = document.getElementById('question-card');
  card.innerHTML = `
    <div class="question-num">${q.num}</div>
    <div class="question-text">${q.text}</div>
    <div class="question-sub">${q.sub}</div>
    <div class="options-grid">
      ${q.options.map((o, i) => `
        <button class="option-btn ${answers[current] === i ? 'selected' : ''}" onclick="selectOption(${i})">
          <span class="option-icon">${o.icon}</span>
          <span>
            <div class="option-label">${o.label}</div>
            <div class="option-desc">${o.desc}</div>
          </span>
        </button>
      `).join('')}
    </div>
  `;
  const pct = ((current + 1) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${current + 1} / ${questions.length} 단계`;
  document.getElementById('btn-back').style.display = current > 0 ? 'block' : 'none';
  document.getElementById('btn-next').disabled = answers[current] === undefined;
  const isLast = current === questions.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '결과 보기 ✨' : '다음 →';
}

function selectOption(i) {
  answers[current] = i;
  renderQuestion();
}

function goNext() {
  if (answers[current] === undefined) return;
  if (current < questions.length - 1) { current++; renderQuestion(); }
  else showResult();
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function getRecommendations() {
  const home  = questions[0].options[answers[0]].label;
  const size  = questions[1].options[answers[1]].label;
  const concern = questions[2].options[answers[2]].label;
  const budget  = questions[3].options[answers[3]].label;
  const floor   = questions[4].options[answers[4]].label;

  const isPremium   = answers[3] === 2;
  const isEco       = answers[3] === 0;
  const isHighFloor = answers[4] === 2;
  const isNoise     = answers[2] === 1;
  const isDew       = answers[2] === 2;
  const isVent      = answers[2] === 3;

  const priceMap = {
    소형:  { lx5: "45~70만원",  lx7: "95~130만원",  kcc: "65~95만원",  hyundai: "50~80만원"  },
    중형:  { lx5: "70~105만원", lx7: "140~200만원", kcc: "100~150만원", hyundai: "80~130만원" },
    대형:  { lx5: "110~160만원",lx7: "220~320만원", kcc: "160~230만원", hyundai: "130~190만원"}
  };
  const p = priceMap[size] || priceMap["중형"];

  const recs = [];

  if (isPremium || isHighFloor) {
    recs.push({
      best: true, rank: "⭐ 최우선 추천",
      brand: "LX하우시스", brandClass: "brand-lx",
      product: "수퍼세이브 7 트리플 시스템창",
      model: "LX Z:IN 수퍼세이브 7 (3중 유리)",
      reasons: [
        "3중 유리 + 아르곤가스 충전으로 최고 단열 성능 (Uw 0.85)",
        isHighFloor ? "고층 고풍압 1등급 기밀 구조" : "결로 발생률 98% 감소",
        isNoise ? "42dB 이상 소음 차단" : "연간 난방비 30% 절감 효과",
        "친환경 무연 PVC 프레임 · 20년 보증"
      ],
      price: p.lx7, rating: 5
    });
  }

  recs.push({
    best: false, rank: recs.length === 0 ? "⭐ 최우선 추천" : "2순위",
    brand: "KCC", brandClass: "brand-kcc",
    product: "이지창 플러스 시스템창",
    model: "KCC 숲&숲 이지창 플러스 (2중~3중 선택)",
    reasons: [
      isNoise ? "독립 공기층 구조로 소음 차단 39dB" : "고기밀 구조로 단열 우수 (Uw 1.0)",
      isDew ? "고단열 프레임으로 결로 최소화" : "이중 실링 구조 · 기밀 1등급",
      isHighFloor ? "중·고층 풍압 강화 설계" : "아파트·빌라 표준 규격 맞춤",
      "30년 이상 시공 경험 · 전국 A/S망"
    ],
    price: p.kcc, rating: 4
  });

  recs.push({
    best: false, rank: recs.length <= 1 ? "2순위" : "3순위",
    brand: "현대L&C", brandClass: "brand-hyundai",
    product: "엔썸 시스템창",
    model: "현대L&C 엔썸 프리미엄 (2중 로이유리)",
    reasons: [
      isVent ? "환기 필터 내장형 · 미세먼지 차단" : "로이(Low-E) 유리로 자외선·적외선 차단",
      isEco ? "경제형 라인 운영 · 합리적 가격" : "고성능 단열 프레임 (Uw 1.1)",
      home === "단독주택" ? "단독주택 비규격 사이즈 제작 가능" : "표준 아파트 규격 빠른 납기",
      "현대그룹 계열사 · 품질 보증 15년"
    ],
    price: p.hyundai, rating: isEco ? 5 : 3
  });

  if (isEco && !isHighFloor) {
    recs.unshift({
      best: true, rank: "⭐ 최우선 추천",
      brand: "LX하우시스", brandClass: "brand-lx",
      product: "수퍼세이브 5 시스템창",
      model: "LX Z:IN 수퍼세이브 5 (2중 로이유리)",
      reasons: [
        "2중 로이유리로 단열·가성비 최고 균형",
        "국내 점유율 1위 · 검증된 내구성",
        "표준 사이즈 재고 보유로 빠른 시공 가능",
        "분리수거 가능 친환경 프레임"
      ],
      price: p.lx5, rating: 4
    });
    recs.length = 3;
    recs[1].rank = "2순위";
    recs[2].rank = "3순위";
  }

  return { recs, home, size, concern, budget, floor };
}

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';
  const { recs, home, size, concern, budget, floor } = getRecommendations();

  document.getElementById('result-title').textContent = `${home} ${floor} 고객님 맞춤 추천`;
  document.getElementById('result-sub').textContent = `${concern} 해결 · ${budget} 기준 · ${size} 창호 3종 선별`;
  document.getElementById('summary-box').innerHTML =
    `<strong>${home}</strong> · <strong>${floor}</strong> · <strong>${size} 창문</strong><br>` +
    `주요 고민 <strong>${concern}</strong> · 예산 <strong>${budget}</strong> 기준으로 최적 창호를 선별했습니다.`;

  const badgeClass = ['badge-best','badge-2nd','badge-3rd'];
  document.getElementById('rec-cards').innerHTML = recs.map((r, idx) => `
    <div class="rec-card ${r.best ? 'top-pick' : ''}">
      <div class="rec-top">
        <div class="best-badge ${badgeClass[idx]}">${r.rank}</div><br>
        <span class="brand-tag ${r.brandClass}">${r.brand}</span>
        <div class="product-name">${r.product}</div>
        <div class="product-model">${r.model}</div>
      </div>
      <div class="rec-body">
        <div class="reason-title">추천 이유</div>
        <ul class="reason-list">${r.reasons.map(rs => `<li>${rs}</li>`).join('')}</ul>
      </div>
      <div class="rec-footer">
        <div>
          <div class="price-label">창 1개 · 시공비 포함</div>
          <div class="price-val">${r.price}</div>
        </div>
        <div style="text-align:right">
          <div class="price-label" style="margin-bottom:4px">만족도</div>
          <div class="rating-dots">${[1,2,3,4,5].map(d=>`<div class="dot ${d<=r.rating?'on':''}"></div>`).join('')}</div>
        </div>
      </div>
    </div>
  `).join('');

  window.scrollTo(0, 0);
}

function restart() {
  answers.length = 0;
  current = 0;
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  renderQuestion();
  window.scrollTo(0, 0);
}

renderQuestion();
</script>
</body>
</html>
