<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아산창호시스템 · 창호 추천 진단</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nanum+Pen+Script&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f6f9;color:#1a1a1a;min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;position:relative;overflow:hidden;}

/* HEADER */
.app-header{background:#1554A0;padding:14px 20px;display:flex;align-items:center;gap:10px;}
.logo-box{display:flex;align-items:center;gap:8px;}
.logo-icon{width:36px;height:36px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{color:#fff;font-size:15px;font-weight:700;line-height:1.3;}
.logo-sub{color:rgba(255,255,255,0.75);font-size:11px;}

/* INTRO PAGE */
.intro-page{padding:0;display:block;}
.intro-hero{background:linear-gradient(135deg,#1554A0 0%,#1e78d4 100%);padding:48px 24px 40px;text-align:center;color:#fff;}
.intro-badge{display:inline-block;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);border-radius:20px;font-size:12px;padding:5px 14px;margin-bottom:18px;letter-spacing:0.5px;}
.intro-hero h1{font-size:22px;font-weight:900;line-height:1.45;margin-bottom:10px;}
.intro-hero h1 span{color:#FFD700;}
.intro-desc{font-size:14px;line-height:1.8;opacity:0.9;margin-bottom:24px;}
.intro-meta{display:flex;justify-content:center;gap:20px;margin-bottom:28px;}
.intro-meta-item{text-align:center;}
.intro-meta-num{font-size:22px;font-weight:900;color:#FFD700;}
.intro-meta-label{font-size:11px;opacity:0.8;margin-top:2px;}
.btn-start{background:#FFD700;color:#1554A0;border:none;border-radius:14px;padding:16px 40px;font-size:17px;font-weight:900;cursor:pointer;width:100%;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:transform 0.1s;}
.btn-start:active{transform:scale(0.97);}
.intro-brands{padding:24px 20px;border-bottom:1px solid #f0f0f0;}
.intro-brands-title{font-size:12px;color:#999;text-align:center;margin-bottom:14px;letter-spacing:0.5px;}
.brand-pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
.brand-pill{background:#f0f5ff;color:#1554A0;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;}

/* PROGRESS */
.progress-wrap{padding:14px 20px 0;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-step{font-size:13px;font-weight:700;color:#1554A0;}
.progress-pct{font-size:12px;color:#aaa;}
.progress-bar{background:#eef2f7;border-radius:99px;height:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#1554A0,#1e78d4);border-radius:99px;transition:width 0.4s ease;}

/* SECTION LABEL */
.section-label{margin:16px 20px 0;display:flex;align-items:center;gap:8px;}
.section-label-line{flex:1;height:1px;background:#eee;}
.section-label-text{font-size:11px;color:#aaa;font-weight:700;letter-spacing:1px;white-space:nowrap;}

/* QUESTION CARD */
.q-card{margin:10px 16px 0;background:#fff;border:1px solid #e8edf5;border-radius:16px;padding:20px;}
.q-num{font-size:11px;color:#1554A0;font-weight:700;margin-bottom:6px;letter-spacing:0.5px;}
.q-text{font-size:16px;font-weight:700;color:#1a1a1a;line-height:1.5;margin-bottom:4px;}
.q-sub{font-size:12px;color:#aaa;margin-bottom:16px;}

/* CUSTOMER INFO */
.info-field{margin-bottom:12px;}
.info-label{font-size:13px;font-weight:700;color:#444;margin-bottom:6px;}
.info-input{width:100%;border:1px solid #dde3ee;border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:border-color 0.15s;}
.info-input:focus{border-color:#1554A0;}

/* OPTIONS */
.options{display:grid;gap:8px;}
.opt-btn{background:#fff;border:1px solid #dde3ee;border-radius:12px;padding:13px 15px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.15s;width:100%;}
.opt-btn:hover{background:#f5f8ff;border-color:#aac3ee;}
.opt-btn.selected{border:2px solid #1554A0;background:#EEF4FF;}
.opt-btn.multi-selected{border:2px solid #1554A0;background:#EEF4FF;}
.opt-check{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:12px;}
.opt-btn.selected .opt-check,.opt-btn.multi-selected .opt-check{background:#1554A0;border-color:#1554A0;color:#fff;}
.opt-label{font-size:14px;font-weight:500;color:#1a1a1a;flex:1;}
.opt-btn.selected .opt-label,.opt-btn.multi-selected .opt-label{color:#1554A0;font-weight:700;}
.multi-hint{font-size:11px;color:#aaa;margin-bottom:8px;}

/* NAV */
.nav-row{padding:14px 16px 24px;display:flex;gap:10px;}
.btn-back{padding:13px 20px;border:1px solid #ddd;border-radius:12px;background:#fff;cursor:pointer;color:#666;font-size:15px;font-weight:500;}
.btn-next{flex:1;padding:13px;border:none;border-radius:12px;background:#1554A0;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.btn-next:disabled{opacity:0.3;cursor:not-allowed;}
.btn-next:not(:disabled):hover{opacity:0.88;}

/* RESULT PAGE */
.result-page{display:none;position:relative;}
canvas#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;}
.result-hero{background:linear-gradient(135deg,#1554A0,#1e78d4);padding:32px 24px 28px;text-align:center;color:#fff;position:relative;z-index:1;}
.result-handwrite{font-family:'Nanum Pen Script',cursive;font-size:28px;color:#FFD700;margin-bottom:8px;display:block;}
.result-name{font-size:15px;opacity:0.85;margin-bottom:4px;}
.result-summary{font-size:13px;opacity:0.7;}

/* REC CARDS */
.rec-section{padding:16px 16px 8px;}
.rec-section-title{font-size:13px;color:#999;font-weight:700;letter-spacing:0.5px;margin-bottom:12px;}
.rec-card{border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
.rec-card-1{border:2px solid #1554A0;}
.rec-card-2{border:2px solid #E8820C;}
.rec-card-3{border:2px solid #0F8A5F;}
.rec-head-1{background:#1554A0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.rec-head-2{background:#E8820C;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.rec-head-3{background:#0F8A5F;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.rec-rank{color:#fff;font-size:12px;font-weight:700;opacity:0.85;}
.rec-match{color:#FFD700;font-size:20px;font-weight:900;}
.rec-body2{background:#fff;padding:14px 16px;}
.rec-brand{font-size:12px;font-weight:700;color:#888;margin-bottom:4px;}
.rec-product{font-size:16px;font-weight:900;color:#1a1a1a;margin-bottom:8px;}
.rec-tags{display:flex;flex-wrap:wrap;gap:6px;}
.rec-tag{font-size:11px;background:#f0f5ff;color:#1554A0;border-radius:20px;padding:4px 10px;font-weight:600;}

/* CUSTOMER INFO DISPLAY */
.info-display{margin:0 16px 12px;background:#f8f9fc;border-radius:12px;padding:14px 16px;}
.info-display-title{font-size:12px;color:#aaa;font-weight:700;margin-bottom:10px;letter-spacing:0.5px;}
.info-display-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #eee;}
.info-display-row:last-child{border-bottom:none;}
.info-display-key{color:#888;}
.info-display-val{color:#1a1a1a;font-weight:600;}

/* SHARE BTN */
.share-section{padding:8px 16px 32px;}
.btn-share{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:#FEE500;color:#3C1E1E;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;margin-bottom:10px;box-shadow:0 3px 12px rgba(254,229,0,0.4);}
.btn-retry{display:block;width:100%;padding:13px;background:#fff;color:#888;border:1px solid #ddd;border-radius:14px;font-size:14px;cursor:pointer;text-align:center;}

/* ADMIN PAGE */
.admin-page{display:none;padding:0;}
.admin-header{background:#1a1a1a;padding:16px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.admin-title{font-size:16px;font-weight:700;}
.btn-admin-close{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;}
.admin-body{padding:16px;}
.admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:#f4f6f9;border-radius:12px;padding:14px;text-align:center;}
.stat-num{font-size:24px;font-weight:900;color:#1554A0;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}
.response-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:10px;}
.response-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.response-name{font-size:14px;font-weight:700;}
.response-date{font-size:11px;color:#aaa;}
.response-detail{font-size:12px;color:#666;line-height:1.8;}
.response-result{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
.r-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}
.r-badge-1{background:#EEF4FF;color:#1554A0;}
.r-badge-2{background:#FFF3E8;color:#E8820C;}
.r-badge-3{background:#E8F7F1;color:#0F8A5F;}
.admin-empty{text-align:center;padding:40px;color:#aaa;font-size:14px;}
.btn-admin-link{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,0.3);z-index:50;}
.admin-pw-wrap{padding:40px 24px;text-align:center;}
.admin-pw-wrap h2{font-size:18px;font-weight:700;margin-bottom:8px;}
.admin-pw-wrap p{font-size:13px;color:#888;margin-bottom:20px;}
.admin-pw-input{width:100%;border:1px solid #ddd;border-radius:10px;padding:13px;font-size:16px;text-align:center;letter-spacing:4px;margin-bottom:12px;outline:none;}
.btn-admin-login{width:100%;padding:13px;background:#1554A0;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">

<!-- 앱 헤더 -->
<div class="app-header">
  <div class="logo-box">
    <div class="logo-icon">🪟</div>
    <div>
      <div class="logo-text">아산창호시스템</div>

  </div>
</div>

<!-- 인트로 페이지 -->
<div class="intro-page" id="intro-page">

    <div class="intro-meta">

        <div class="intro-meta-label">개 문항</div>
      </div>
      <div class="intro-meta-item">
        <div class="intro-meta-num">3~5</div>
        <div class="intro-meta-label">분 소요</div>
      </div>

        <div class="intro-meta-label">개 브랜드</div>

    <button class="btn-start" onclick="startQuiz()">진단 시작하기 →</button>

  <div class="intro-brands">

</div>

<!-- 퀴즈 페이지 -->
<div id="quiz-page" style="display:none;">
  <div class="progress-wrap">
    <div class="progress-top">

  </div>
  <div class="section-label" id="section-label">
    <div class="section-label-line"></div>
    <div class="section-label-text">기본 정보</div>
    <div class="section-label-line"></div>
  </div>
  <div class="q-card" id="q-card"></div>
  <div class="nav-row">
    <button class="btn-back" id="btn-back" onclick="goBack()" style="display:none">← 이전</button>
    <button class="btn-next" id="btn-next" onclick="goNext()" disabled>다음 →</button>
  </div>
</div>

<!-- 결과 페이지 -->
<div class="result-page" id="result-page">
  <canvas id="confetti-canvas"></canvas>
  <div class="result-hero">
    <span class="result-handwrite">나에게 최적화된 창호는?</span>
    <div class="result-name" id="result-name"></div>
    <div class="result-summary" id="result-summary"></div>
  </div>
  <div id="result-info-display"></div>
  <div class="rec-section">
    <div class="rec-section-title">추천 창호 TOP 3</div>
    <div id="rec-cards-wrap"></div>
  </div>
  <div class="share-section">
    <button class="btn-share" onclick="shareKakao()">
      <span style="font-size:20px">💬</span> 결과를 카카오톡으로 공유하기
    </button>
    <button class="btn-retry" onclick="restartQuiz()">↺ 다시 진단하기</button>
  </div>
</div>

<!-- 관리자 페이지 -->
<div class="admin-page" id="admin-page">
  <div class="admin-header">
    <div class="admin-title">📊 설문 결과 관리</div>
    <button class="btn-admin-close" onclick="closeAdmin()">닫기</button>
  </div>
  <div class="admin-pw-wrap" id="admin-pw-wrap">
    <h2>🔐 관리자 로그인</h2>
    <p>관리자 비밀번호를 입력하세요</p>
    <input class="admin-pw-input" type="password" id="admin-pw-input" placeholder="비밀번호" maxlength="6">
    <button class="btn-admin-login" onclick="checkAdminPw()">확인</button>
  </div>
  <div class="admin-body" id="admin-body" style="display:none;"></div>
</div>

<!-- 관리자 버튼 -->
<button class="btn-admin-link" onclick="openAdmin()" title="관리자">⚙️</button>

</div><!-- /wrap -->

function renderQuestion(){

  const pct = Math.round((current/QUESTIONS.length)*100);

  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('section-label').querySelector('.section-label-text').textContent = SECTIONS[current];
  document.getElementById('btn-back').style.display = current>0?'block':'none';

  const isLast = current===QUESTIONS.length-1;
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? '결과 보기 ✨' : '다음 →';

  const card = document.getElementById('q-card');
  if(q.type==='info'){
    card.innerHTML = `
      <div class="q-num">${q.num}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-sub">${q.sub}</div>
      ${q.fields.map(f=>`
        <div class="info-field">
          <div class="info-label">${f.label}</div>
          <input class="info-input" id="info_${f.key}" placeholder="${f.placeholder}" value="${infoData[f.key]||''}" oninput="updateInfo('${f.key}',this.value)">
        </div>
      `).join('')}
    `;
    checkInfoValid();
  } else if(q.type==='single'){
    card.innerHTML = `
      <div class="q-num">${q.num}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-sub">${q.sub}</div>
      <div class="options">
        ${q.options.map((o,i)=>`
          <button class="opt-btn ${answers[current]===i?'selected':''}" onclick="selectSingle(${i})">

            <div class="opt-label">${o}</div>
          </button>
        `).join('')}
      </div>
    `;
    nextBtn.disabled = answers[current]===null;
  } else if(q.type==='multi'){
    const sel = answers[current]||[];
    card.innerHTML = `
      <div class="q-num">${q.num}</div>
      <div class="q-text">${q.text}</div>
      <div class="multi-hint">복수 선택 가능 (최소 1개)</div>

          <button class="opt-btn ${sel.includes(i)?'multi-selected':''}" onclick="toggleMulti(${i})">

            <div class="opt-label">${o}</div>
          </button>
        `).join('')}

function selectSingle(i){

function toggleMulti(i){
  let sel=answers[current]||[];
  if(sel.includes(i)) sel=sel.filter(x=>x!==i); else sel=[...sel,i];
  answers[current]=sel;
  renderQuestion();
}
function toggleMulti3(i){
  let sel=answers[current]||[];
  if(sel.includes(i)){sel=sel.filter(x=>x!==i);}
  else if(sel.length<3){sel=[...sel,i];}
  answers[current]=sel;
  renderQuestion();
}
function goBack(){
  if(current>0){current--;renderQuestion();}
}
function goNext(){
  if(current<QUESTIONS.length-1){current++;renderQuestion();}
  else{showResult();}
}

// ===================== 점수 계산 =====================
function calcScores(){
  const s=[0,0,0,0,0];
  const maxArr=[0,0,0,0,0];

  function addScore(scoreKey, answerLabel){
    const row=SCORES[scoreKey];
    if(!row||!row[answerLabel]) return;
    const vals=row[answerLabel];
    vals.forEach((v,i)=>{s[i]+=v;});
    const maxRow=Object.values(row).map(arr=>arr[0]);
    // find max per column
    Object.values(row).forEach(arr=>arr.forEach((v,i)=>{if(v>maxArr[i])maxArr[i]=v;}));
  }

  // Q2 housing
  if(answers[1]!==null) addScore('housing', QUESTIONS[1].options[answers[1]]);
  // Q3 floor
  if(answers[2]!==null) addScore('floor', QUESTIONS[2].options[answers[2]]);
  // Q4 climate
  if(answers[3]!==null) addScore('climate', QUESTIONS[3].options[answers[3]]);
  // Q7 problem (multi)
  if(answers[6]&&answers[6].length){
    answers[6].forEach(idx=>{
      const label=QUESTIONS[6].options[idx];
      const row=SCORES['problem'];
      if(row[label]) row[label].forEach((v,i)=>{s[i]+=v;});
    });
    Object.values(SCORES['problem']).forEach(arr=>arr.forEach((v,i)=>{if(v>maxArr[i])maxArr[i]=v;}));
  }
  // Q9 budget
  if(answers[8]!==null) addScore('budget', QUESTIONS[8].options[answers[8]]);
  // Q10 brand
  if(answers[9]!==null) addScore('brand', QUESTIONS[9].options[answers[9]]);
  // Q11 color
  if(answers[10]!==null) addScore('color', QUESTIONS[10].options[answers[10]]);
  // Q12 thickness
  if(answers[11]!==null) addScore('thickness', QUESTIONS[11].options[answers[11]]);
  // Q13 priority
  if(answers[12]!==null) addScore('priority', QUESTIONS[12].options[answers[12]]);

  // 최대 점수 계산
  const totalMax=maxArr.reduce((a,b)=>a+b,0)||1;

  return s.map((v,i)=>({idx:i, score:v, pct:Math.min(100,Math.round((v/Math.max(...s||[1]))*100))}));
}

function getReasonTags(productIdx){
  const tags=[];
  if(productIdx===0) tags.push('슬림 프레임','고단열','국내 1위 브랜드');
  if(productIdx===1) tags.push('가성비 우수','표준 규격','빠른 시공');
  if(productIdx===2) tags.push('고기밀','프리미엄 라인','소음 차단');
  if(productIdx===3) tags.push('디자인 특화','다양한 색상','슬림 프레임');
  if(productIdx===4) tags.push('내구성 우수','고층 적합','고풍압 설계');
  return tags;
}

// ===================== 폭죽 =====================
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const pieces=[];
  const colors=['#1554A0','#FFD700','#E8820C','#0F8A5F','#ff6b6b','#48dbfb','#ff9ff3'];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:-10-Math.random()*200,
      r:4+Math.random()*6,
      d:Math.random()*3+1,
      color:colors[Math.floor(Math.random()*colors.length)],
      tilt:Math.random()*10-10,
      tiltAngle:0,
      tiltAngleInc:Math.random()*0.07+0.05
    });
  }
  let frame=0;
  const anim=setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.tiltAngle+=p.tiltAngleInc;
      p.y+=p.d;
      p.tilt=Math.sin(p.tiltAngle)*12;
      ctx.beginPath();
      ctx.lineWidth=p.r;
      ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+p.tilt+p.r/2,p.y);
      ctx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/2);
      ctx.stroke();
    });
    frame++;
    if(frame>120){clearInterval(anim);ctx.clearRect(0,0,canvas.width,canvas.height);}
  },16);
}

function shareKakao(){
  const nameStr=infoData.apt?`${infoData.apt} ${infoData.dong}동 ${infoData.ho}호`:'고객님';
  const scored=calcScores().sort((a,b)=>b.score-a.score);
  const top3=scored.slice(0,3);
  const text=`[아산창호시스템 AI 창호 추천]\n👤 ${nameStr}\n\n` +
    top3.map((item,rank)=>{
      const p=PRODUCTS[item.idx];
      return `${['🥇','🥈','🥉'][rank]} ${rank+1}순위: ${p.brand} ${p.name} (일치율 ${item.pct}%)`;
    }).join('\n') +
    `\n\n📞 상담문의: 아산창호시스템`;
  
  if(navigator.share){
    navigator.share({title:'아산창호시스템 창호 추천 결과', text:text})
      .catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      alert('결과가 클립보드에 복사되었습니다!\n카카오톡을 열고 붙여넣기 해주세요 😊');
    });
  } else {
    const ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('결과가 복사되었습니다!\n카카오톡에 붙여넣기 해주세요 😊');
  }
}

function exportCSV(){
  const responses=JSON.parse(localStorage.getItem('asan_responses')||'[]');
  const rows=[['날짜','아파트명','동','호','연락처','주택유형','층수','기후','교체시기','1순위','1순위일치율','2순위','2순위일치율','3순위','3순위일치율']];
  responses.forEach(r=>{
    rows.push([
      r.date,r.customer.apt,r.customer.dong,r.customer.ho,r.customer.phone,
      r.answers.housing,r.answers.floor,r.answers.climate,r.answers.timing,
      r.top3[0]?.product||'',r.top3[0]?.pct||'',
      r.top3[1]?.product||'',r.top3[1]?.pct||'',
      r.top3[2]?.product||'',r.top3[2]?.pct||''
    ]);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='아산창호시스템_설문결과.csv';
  a.click();
}

function restartQuiz(){
  document.getElementById('result-page').style.display='none';
  document.getElementById('intro-page').style.display='block';
  window.scrollTo(0,0);
}
